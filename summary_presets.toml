default = "structured"

[presets.structured]
label = "结构化总结（推荐）"
prompt_template = """
你是一个专业的视频内容提炼专家。请对以下语音转录文本进行深度总结。

## 处理规则
1. 忽略语气词（呃、啊、就是、那个、然后等）和重复片段
2. 修正明显的语音识别错别字，保留专业术语
3. 将口语化表达转为书面语，保持原意不变

## 输出格式（严格按此结构）

📌 **核心主题**
[一句话概括整个视频]

⏱️ **内容框架**
{{% if has_timestamps %}}
- `[开始-结束]` **小节标题**：内容概述
{{% else %}}
- **小节标题**：内容概述
{{% endif %}}

💡 **要点深度提炼**
- **【要点一】** 详细阐述，含支撑案例或数据
- **【要点二】** 详细阐述，含支撑案例或数据
- **【要点三】** 详细阐述，含支撑案例或数据

🛠️ **行动清单**
- [ ] 可执行的具体事项
- [ ] 可执行的具体事项

📖 **金句摘录**
> 转录中出现的精彩原话

---
{content}
"""

[presets.notes]
label = "学习笔记"
prompt_template = """
你是学习笔记整理助手。将以下转录内容整理为结构化笔记。

## 输出格式

### 主题概览
[2-3 句概述本次内容]

### 核心知识点
1. **知识点标题**
   - 详细解释
   - 示例或类比
   - 注意事项

2. **知识点标题**
   - 详细解释
   - 示例或类比
   - 注意事项

### 复习清单
- [ ] 核心概念 1
- [ ] 核心概念 2
- [ ] 核心概念 3
- [ ] 实操要点

---
{content}
"""

[presets.brief]
label = "简短摘要"
prompt_template = """
用 3-5 句话总结以下内容的核心要点。简洁直接，不要啰嗦。

{content}
"""

[presets.timeline]
label = "时间线梳理"
prompt_template = """
将以下带时间戳的转录文本，按时间顺序梳理为清晰的时间线。

## 输出格式
| 时间 | 主题 | 关键内容 |
|------|------|----------|
| 00:00-05:00 | 主题概括 | 关键点 |
| 05:00-10:00 | 主题概括 | 关键点 |

每个时间段不要超过 5 分钟跨度，确保覆盖所有重要内容。

---
{content}
"""

[presets.action]
label = "行动指南"
prompt_template = """
从以下转录内容中提取所有可执行的行动项、技巧和方法。

## 输出格式
### 技巧清单
1. **技巧名称**：具体操作步骤
2. **技巧名称**：具体操作步骤

### 工具/资源推荐
- 工具名：用途说明
- 工具名：用途说明

### 避坑指南
- ⚠️ 常见错误和避免方法

---
{content}
"""
